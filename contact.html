<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">
    <title>Contact | Zosia Valstar – Psychosociale Therapie Maassluis</title>
    <meta name="description" content="Neem contact op met Zosia Valstar – psychosociale therapie in Maassluis. Ferdinand Bolplein 9, gratis parkeren. Stuur een bericht of mail naar info@zosiavalstar.nl.">
    <link rel="canonical" href="https://www.zosiavalstar.nl/contact.html">

    <!-- Open Graph -->
    <meta property="og:title" content="Contact | Zosia Valstar">
    <meta property="og:description" content="Neem contact op voor een kennismakingsgesprek. Ferdinand Bolplein 9, Maassluis – gratis parkeren.">
    <meta property="og:image" content="https://www.zosiavalstar.nl/assets/images/og-image.webp">
    <meta property="og:url" content="https://www.zosiavalstar.nl/contact.html">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="nl_NL">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main style="padding-top: 150px;">
        <section class="section">
            <div class="reveal" style="max-width: var(--container-max); margin: 0 auto 50px;">
                <h1 style="font-size: clamp(2.2rem, 4vw, 3.2rem);">Laten we kennismaken.</h1>
                <p style="color: var(--grey); font-size: 1.05rem; margin-top: 14px;">
                    Ferdinand Bolplein 9, 3141 GB Maassluis &nbsp;·&nbsp; <strong style="color: var(--dark);">Gratis parkeren</strong> &nbsp;·&nbsp;
                    <a href="mailto:info@zosiavalstar.nl" style="color: var(--dark); font-weight: 600;">info@zosiavalstar.nl</a>
                </p>
            </div>

            <div class="centered-container contact-layout reveal">
                <div class="map-box">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2462.8364843997784!2d4.246476112520864!3d51.91866717178971!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47c4490f23f81e7d%3A0xc068869c99666014!2sFerdinand%20Bolplein%209%2C%203141%20GB%20Maassluis!5e0!3m2!1snl!2snl!4v1715600000000"
                        width="100%" height="100%"
                        style="border:0;"
                        allowfullscreen=""
                        loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade"
                        title="Locatie praktijk Zosia Valstar – Ferdinand Bolplein 9 Maassluis">
                    </iframe>
                </div>
                <div class="form-box">
                    <form id="contact-form" action="https://formspree.io/f/JOUW-FORMSPREE-ID" method="POST">
                        <input type="hidden" name="_subject" value="Nieuw bericht via website Zosia Valstar">
                        <input type="hidden" name="_language" value="nl">

                        <div class="f-group">
                            <label for="name">Naam *</label>
                            <input type="text" id="name" name="name" autocomplete="name" required placeholder="Jouw naam">
                        </div>
                        <div class="f-group">
                            <label for="email">E-mail *</label>
                            <input type="email" id="email" name="email" autocomplete="email" required placeholder="jouw@email.nl">
                        </div>
                        <div class="f-group">
                            <label for="onderwerp">Onderwerp</label>
                            <select id="onderwerp" name="onderwerp">
                                <option value="">Kies een onderwerp…</option>
                                <option value="Kennismakingsgesprek">Kennismakingsgesprek plannen</option>
                                <option value="Individuele therapie">Individuele therapie</option>
                                <option value="Relatietherapie">Relatietherapie</option>
                                <option value="Vraag">Algemene vraag</option>
                            </select>
                        </div>
                        <div class="f-group">
                            <label for="message">Bericht *</label>
                            <textarea id="message" name="message" required placeholder="Beschrijf kort je hulpvraag of stel je vraag…" style="height: 160px; resize: vertical;"></textarea>
                        </div>
                        <button type="submit" class="btn" style="width: 100%; justify-content: center;">
                            Verstuur bericht
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="js/script.js"></script>
</body>
</html>
