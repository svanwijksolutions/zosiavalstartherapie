<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werkwijze & Tarieven | Zosia Valstar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <main style="padding-top: 140px;">
        <section class="section reveal">
            <div style="max-width: var(--container-max); margin: 0 auto;">
                <h2 style="font-size: 3.5rem; text-align: center; margin-bottom: 50px;">Werkwijze & <span style="color:var(--accent)">Tarieven</span></h2>
                <div class="price-grid">
                    <div class="price-card">
                        <h4>Kennismaking</h4>
                        <p>Een eerste ontmoeting om jouw hulpvraag te verkennen.</p>
                        <div><span class="price-tag">€80</span><small>Sessie van 90 min</small></div>
                    </div>
                    <div class="price-card">
                        <h4>Individueel</h4>
                        <p>Sessies gericht op persoonlijke groei en balans.</p>
                        <div><span class="price-tag">€80</span><small>Sessie van 75-90 min</small></div>
                    </div>
                    <div class="price-card">
                        <h4>Relatietherapie</h4>
                        <p>Samen werken aan patronen en verbinding.</p>
                        <div><span class="price-tag">€100</span><small>Sessie van 90 min</small></div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <div id="footer-placeholder"></div>
    <script src="js/script.js"></script>
</body>
</html>
