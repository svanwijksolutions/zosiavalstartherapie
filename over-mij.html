<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Over Zosia Valstar – psychosociaal hulpverlener en Gestalttherapeut in Maassluis.">
    <title>Over Mij | Zosia Valstar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main style="padding-top: 150px;">
        <section class="section">
            <div class="centered-container reveal">
                <div class="flex-image">
                    <img src="assets/images/portret.webp" alt="Zosia Valstar" class="rounded-img" loading="lazy">
                </div>
                <div class="flex-text">
                    <h2 style="font-size: clamp(2.2rem, 4vw, 3.2rem); margin-bottom: 25px;">Wie is Zosia?</h2>
                    <p style="margin-bottom: 20px;">
                        Ik ben geboren in Polen (1987) en na mijn studie econometrie verhuisd naar Nederland. Samen met mijn man heb ik drie kinderen.
                    </p>
                    <p style="color: var(--grey);">
                        Ik ben nieuwsgierig naar mensen, op zoek naar echtheid, leer graag en houd van humor. Naast hulpverlener ben ik ook christen, minimalist en sport ik graag.
                    </p>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="js/script.js"></script>
</body>
</html>
